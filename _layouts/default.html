<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <a class="brand" href="/">
        <svg class="brand-mark" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="1" x2="12" y2="6" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="18" x2="12" y2="23" stroke="currentColor" stroke-width="1.5"/>
          <line x1="1" y1="12" x2="6" y2="12" stroke="currentColor" stroke-width="1.5"/>
          <line x1="18" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
        </svg>
        Ticker<span class="brand-accent">Strike</span>
      </a>
      <div class="nav-links">
        <a href="#features">Features</a>
        <a href="#how-it-works">How it works</a>
        <a href="#pricing">Pricing</a>
        <a href="#faq">FAQ</a>
        <a class="btn btn-small" href="#waitlist">Join waitlist</a>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>&copy; {{ 'now' | date: "%Y" }} TickerStrike. All rights reserved.</span>
      <span class="footer-disclaimer">TickerStrike is a research tool, not investment advice. Trading involves risk.</span>
    </div>
  </footer>
</body>
</html>
